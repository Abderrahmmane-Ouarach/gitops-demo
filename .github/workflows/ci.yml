name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'helm/values.yaml'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm install
      - run: npm test
  
  sonarqube:
    runs-on: ubuntu-latest
    needs: test 
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   

  scan-code:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Scan dependencies for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
  

  build:
    runs-on: ubuntu-latest
    needs: [scan-code, sonarqube]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gitops-demo:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gitops-demo:${{ github.sha }}


  scan-image:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/gitops-demo:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true


  update-manifest:
    runs-on: ubuntu-latest
    needs: scan-image
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update image tag
        run: |
          echo "Before:"
          cat helm/values.yaml | grep tag
          sed -i "s/tag: .*/tag: \"${{ github.sha }}\"/" helm/values.yaml
          echo "After:"
          cat helm/values.yaml | grep tag

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push