name: CI

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - 'helm/values.staging.yaml'
      - 'helm/values.production.yaml'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm test

  sonarqube:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Abderrahmmane-Ouarach_gitops-demo
            -Dsonar.organization=abderrahmmane-ouarach
            -Dsonar.sources=.
            -Dsonar.host.url=https://sonarcloud.io

  scan-code:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Scan dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

  build:
    runs-on: ubuntu-latest
    needs: [scan-code, sonarqube]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gitops-demo:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gitops-demo:${{ github.sha }}

  scan-image:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/gitops-demo:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

  update-staging:
    runs-on: ubuntu-latest
    needs: scan-image
    if: github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: staging
      - name: Update staging tag
        run: |
          sed -i "s/tag: .*/tag: \"${{ github.sha }}\"/" helm/values.staging.yaml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values.staging.yaml
          git commit -m "ci: update staging tag to ${{ github.sha }}"
          git push

  update-production:
    runs-on: ubuntu-latest
    needs: scan-image
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: main
      - name: Update production tag
        run: |
          sed -i "s/tag: .*/tag: \"${{ github.sha }}\"/" helm/values.production.yaml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values.production.yaml
          git commit -m "ci: update production tag to ${{ github.sha }}"
          git push