apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gitops-demo-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: gitops-demo
  namespaceSelector:
    matchNames:
      - staging
      - production
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
