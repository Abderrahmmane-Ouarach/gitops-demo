apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-demo-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Abderrahmmane-Ouarach/gitops-demo.git
    targetRevision: staging
    path: helm
    helm:
      valueFiles:
        - values.yaml
        - values.staging.yaml
      parameters:
        - name: env
          value: staging
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true